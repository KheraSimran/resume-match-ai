services:
  api:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - .:/app
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - '8001:8000'
    volumes:
      - chroma_data:/chroma/chroma
volumes:
  chroma_data: